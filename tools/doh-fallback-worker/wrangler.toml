name            = "doh-fallback-worker"
main            = "worker.js"
compatibility_date = "2024-09-23"

# ─── KV namespace ─────────────────────────────────────────────────────────────
# Create the namespace first:
#   wrangler kv namespace create DOH_KV
# Then replace the id below with the output value.

[[kv_namespaces]]
binding = "DOH_KV"
id      = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"

# ─── Notes ────────────────────────────────────────────────────────────────────
# Tokens are never stored in this file.
# Add your private token as a secret via the Cloudflare dashboard or:
#   wrangler secret put DOH_TOKEN   (for reference only — token is read from KV)
#
# To populate a token profile and its rules:
#   wrangler kv key put --binding DOH_KV "profile:<token>" '{"name":"personal","upstreams":["cf","google","quad9"],"cachePolicy":{"minTtl":60,"maxTtl":86400,"defaultTtl":300,"prefetchRatio":0.75,"staleIfErrorWindow":120}}'
#   wrangler kv key put --binding DOH_KV "rules:<token>" --path rules.json
